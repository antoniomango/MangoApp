<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mango Srl — Produzione</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
:root { --bg:#F2EDE6; --surface:#FDFAF6; --border:#D9CFC4; --wood:#8B5E3C; --ink:#1C1714; --muted:#7A6E65; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.container { max-width: 420px; width: 100%; }
.logo { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.logo-mark { width: 44px; height: 44px; background: var(--wood); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); flex-shrink: 0; }
.logo h1 { font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.12em; text-transform: uppercase; }
.subtitle { font-size: 13px; color: var(--muted); margin-bottom: 40px; padding-left: 58px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; text-decoration: none; display: block; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.card-inner { padding: 20px; display: flex; align-items: center; gap: 16px; }
.card-icon { font-size: 28px; flex-shrink: 0; }
.card-text h2 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.card-text p { font-size: 13px; color: var(--muted); }
.card-arrow { margin-left: auto; color: var(--muted); font-size: 18px; }
.tag { display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace; background: var(--bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; color: var(--muted); margin-top: 5px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Mango</h1>
  </div>
  <p class="subtitle">Sistema di gestione produzione</p>

  <a class="card" href="responsabile.html">
    <div class="card-inner">
      <div class="card-icon">🖥️</div>
      <div class="card-text">
        <h2>Responsabile</h2>
        <p>Dashboard completa, gestione ordini, operatori e NC</p>
        <span class="tag">PC · Login email</span>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a class="card" href="operatore.html">
    <div class="card-inner">
      <div class="card-icon">👷</div>
      <div class="card-text">
        <h2>Operatore</h2>
        <p>Gestione fasi, foto, segnalazione NC · Offline-first</p>
        <span class="tag">Mobile · PIN</span>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a class="card" href="sola_lettura.html">
    <div class="card-inner">
      <div class="card-icon">👁️</div>
      <div class="card-text">
        <h2>Produzione Live</h2>
        <p>Avanzamento ordini in tempo reale, sola lettura</p>
        <span class="tag">Mobile · PIN</span>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>
</div>
</body>
</html>
